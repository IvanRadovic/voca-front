# Local development only - Coolify builds the Dockerfile directly.
#
# This compose expects the voca-back repo to be checked out as a sibling
# directory (../voca-back) so the whole stack (frontend + API + MySQL) can be
# brought up with one command:
#
#   docker compose up --build
#
# Frontend: http://localhost:5173
# API:      http://localhost:8000
# Adminer:  http://localhost:8081 (server=db, user=voca, pass=secret)

services:
  web:
    build:
      context: .
      args:
        # Point the SPA at the API service exposed below.
        VITE_API_URL: http://localhost:8000/api
    image: bip-tech/web:dev
    ports:
      - "5173:8080"
    depends_on:
      - api

  api:
    build:
      context: ../voca-back
    image: bip-tech/api:dev
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:Zm9yLWxvY2FsLWRldi1vbmx5LWRvLW5vdC11c2UtaW4tcHJvZA==}
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: voca
      DB_USERNAME: voca
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: log
      SANCTUM_STATEFUL_DOMAINS: localhost:5173,127.0.0.1:5173
      RUN_MIGRATIONS: "true"
    volumes:
      - ../voca-back:/var/www/html
      - api-vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: voca
      MYSQL_USER: voca
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uvoca", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  mysql-data:
  api-vendor:
